# Kubernetes manifests for Yosai MLOps
# Apply with: kubectl apply -f infrastructure/k8s/

apiVersion: v1
kind: Namespace
metadata:
  name: yosai-mlops

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yosai-config
  namespace: yosai-mlops
data:
  MLFLOW_TRACKING_URI: "http://mlflow-server:5000"
  YOSAI_MLFLOW_EXPERIMENT: "yosai-edge-mlops"
  ENVIRONMENT: "production"

---
apiVersion: v1
kind: Service
metadata:
  name: yosai-api
  namespace: yosai-mlops
spec:
  selector:
    app: yosai-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yosai-api
  namespace: yosai-mlops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: yosai-api
  template:
    metadata:
      labels:
        app: yosai-api
    spec:
      containers:
        - name: api
          image: yosai/mlops:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: yosai-config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: yosai-api-hpa
  namespace: yosai-mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: yosai-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70